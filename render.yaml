services:
  - type: web
    name: findaminyan-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FINDAMINYAN_EMAIL
        sync: false
      - key: FINDAMINYAN_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ADMIN_PHONE
        sync: false
